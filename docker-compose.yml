services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jhon829
    restart: always
    networks:
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jhon829.entrypoints=web"
      - "traefik.http.routers.jhon829.rule=Host(`jhon829.com`) || Host(`www.jhon829.com`)"
      - "traefik.http.routers.jhon829-secure.entrypoints=websecure"
      - "traefik.http.routers.jhon829-secure.rule=Host(`jhon829.com`) || Host(`www.jhon829.com`)"
      - "traefik.http.routers.jhon829-secure.tls=true"
      - "traefik.http.routers.jhon829-secure.tls.certresolver=letsencrypt"
      - "traefik.http.services.jhon829.loadbalancer.server.port=80"

networks:
  traefik-network:
    external: true
